<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0f172a">
    <title>Offline - Weather Pluse+</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e3a5f);
            color: #f1f5f9;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .offline-container {
            text-align: center;
            max-width: 400px;
        }
        .offline-icon {
            width: 120px;
            height: 120px;
            margin: 0 auto 24px;
            opacity: 0.8;
        }
        .offline-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 0 20px rgba(59, 130, 246, 0.3));
        }
        h1 {
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 12px;
            letter-spacing: -0.5px;
        }
        p {
            font-size: 1rem;
            color: #94a3b8;
            margin-bottom: 8px;
            line-height: 1.6;
        }
        .offline-actions {
            margin-top: 32px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .btn {
            padding: 14px 28px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
            display: inline-block;
            font-family: inherit;
        }
        .btn-primary {
            background: #3b82f6;
            color: #fff;
            border: none;
        }
        .btn-primary:hover {
            background: #2563eb;
            transform: translateY(-2px);
        }
        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #f1f5f9;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.15);
        }
        .cached-info {
            margin-top: 24px;
            padding: 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
        }
        .cached-info h3 {
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: #e2e8f0;
        }
        .cached-info p {
            font-size: 0.85rem;
            margin-bottom: 4px;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .pulse {
            animation: pulse 2s ease-in-out infinite;
        }
    </style>
</head>
<body>
    <div class="offline-container">
        <div class="offline-icon">
            <img src="assets/icons/icon-192.png" alt="Weather Pluse+">
        </div>
        <h1>You are Offline</h1>
        <p>It looks like you have lost your internet connection.</p>
        <p class="pulse">Checking for cached weather data...</p>

        <div class="offline-actions">
            <button class="btn btn-primary" onclick="window.location.reload()">Try Again</button>
            <a href="index.html" class="btn btn-secondary">Back to App</a>
        </div>

        <div class="cached-info" id="cached-info">
            <h3>Last Cached Weather</h3>
            <p id="cached-city">Loading...</p>
            <p id="cached-time">--</p>
        </div>
    </div>

    <script>
        // Try to load cached data
        (function() {
            try {
                const cached = localStorage.getItem('wp_weather_cache');
                if (cached) {
                    const data = JSON.parse(cached);
                    if (data.city && data.current) {
                        document.getElementById('cached-city').textContent = 
                            data.city.name + (data.city.country ? ', ' + data.city.country : '');
                        document.getElementById('cached-time').textContent = 
                            'Last updated: ' + new Date(data.timestamp).toLocaleString();
                    }
                } else {
                    document.getElementById('cached-info').style.display = 'none';
                }
            } catch (e) {
                document.getElementById('cached-info').style.display = 'none';
            }
        })();
    </script>
</body>
</html>
